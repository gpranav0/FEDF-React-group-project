name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Tests
      run: npm run test

    - name: Build Application
      run: npm run build
      env:
        VITE_APP_NAME: "Personal Finance Tracker"
        VITE_VERSION: "1.0.0"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/
